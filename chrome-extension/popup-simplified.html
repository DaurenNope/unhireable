<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Unhireable - Apply Queue</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 360px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #fff;
            padding: 16px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 11px;
            color: #a1a1aa;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            margin-top: 8px;
        }

        .btn-success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 16px 0;
        }

        .stat {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 10px;
            color: #a1a1aa;
            text-transform: uppercase;
        }

        .job-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .job-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .job-item.applied {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .job-item.failed {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .job-info {
            flex: 1;
        }

        .job-title {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .job-company {
            font-size: 11px;
            color: #a1a1aa;
        }

        .job-score {
            font-size: 14px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(99, 102, 241, 0.2);
            color: #6366f1;
        }

        .status-badge {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
        }

        .status-pending {
            background: rgba(255,255,255,0.1);
            color: #a1a1aa;
        }

        .status-applied {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #71717a;
        }

        .empty-state p {
            font-size: 13px;
            margin-top: 8px;
        }

        input[type="file"] {
            display: none;
        }

        .footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 11px;
            color: #71717a;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🚀</div>
        <div>
            <div class="title">Unhireable</div>
            <div class="subtitle">Auto-Apply Queue</div>
        </div>
    </div>

    <div id="noQueueState">
        <div class="empty-state">
            <div style="font-size: 32px;">📋</div>
            <p>No jobs in queue</p>
            <p style="font-size: 11px; margin-top: 8px;">
                Export queue from dashboard first
            </p>
        </div>
        <input type="file" id="queueFileInput" accept=".json">
        <button class="btn btn-primary" id="importBtn">
            📁 Import Queue
        </button>
    </div>

    <div id="queueState" style="display: none;">
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statApplied">0</div>
                <div class="stat-label">Applied</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="statRemaining">0</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>

        <button class="btn btn-success" id="applyAllBtn">
            ▶ Apply to All Jobs
        </button>

        <button class="btn btn-secondary" id="importNewBtn">
            📁 Import New Queue
        </button>

        <div class="job-list" id="jobList">
            <!-- Jobs rendered here -->
        </div>
    </div>

    <div class="footer">
        Queue-based auto-application system
    </div>

    <script src="popup-simplified.js"></script>
</body>
</html>
