<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Unhireable</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e4e4e7;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .title { font-size: 16px; font-weight: 600; }
        .subtitle { font-size: 11px; color: #71717a; }
        .status {
            font-size: 12px;
            color: #a1a1aa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #22c55e;
        }
        .status-dot.inactive { background: #71717a; }
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover:not(:disabled) { opacity: 0.95; }
        .btn-secondary {
            background: rgba(255,255,255,0.08);
            color: #e4e4e7;
            margin-top: 6px;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.12); }
        .profile-line {
            font-size: 12px;
            color: #a1a1aa;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-line a { color: #6366f1; cursor: pointer; font-size: 11px; }
        .expand {
            margin-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 12px;
        }
        .expand-header {
            font-size: 12px;
            color: #71717a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }
        .expand-header:hover { color: #a1a1aa; }
        .expand-content { display: none; }
        .expand-content.open { display: block; }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 12px;
        }
        .row label { color: #a1a1aa; }
        select, input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 4px 0 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 12px;
        }
        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 22px;
            cursor: pointer;
        }
        .toggle-slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: 0.2s;
        }
        .toggle input:checked + .toggle-slider { background: #6366f1; }
        .toggle input:checked + .toggle-slider:before { transform: translateX(18px); }
        .toast {
            background: rgba(34, 197, 94, 0.15);
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🚀</div>
        <div>
            <div class="title">Unhireable</div>
            <div class="subtitle">Auto-Apply</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <div class="status">
        <div id="statusDot" class="status-dot inactive"></div>
        <span id="statusText">Checking...</span>
    </div>

    <button id="fillBtn" class="btn btn-primary" disabled>
        <span>⚡</span>
        <span>Apply to this job</span>
    </button>

    <button id="justApplyBtn" class="btn btn-primary" style="margin-top: 6px; display: none;" disabled>
        <span>🎯</span>
        <span>Apply to current job</span>
    </button>

    <button id="scoutBtn" class="btn btn-secondary">
        <span>🔍</span>
        <span>Scout jobs</span>
    </button>

    <div class="profile-line">
        <span id="profileSummary">No profile</span>
        <a id="editProfileLink">Edit</a>
    </div>

    <div class="expand">
        <div id="settingsToggle" class="expand-header">
            <span>▶</span>
            <span>Settings</span>
        </div>
        <div id="settingsPanel" class="expand-content">
            <div class="row">
                <label>Auto-submit</label>
                <label class="toggle">
                    <input type="checkbox" id="autoSubmitToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <div class="row">
                <label>AI provider</label>
            </div>
            <select id="llmProviderSelect">
                <option value="chrome_ai">Chrome AI (no setup)</option>
                <option value="unhireable_proxy">Unhireable Free</option>
                <option value="groq">Groq</option>
                <option value="gemini">Gemini</option>
                <option value="local">Ollama (local)</option>
                <option value="mistral">Mistral</option>
            </select>
            <div id="llmProxySection" style="display: none; margin-top: 8px;">
                <label style="font-size: 11px; color: #71717a;">Proxy URL</label>
                <input type="text" id="unhireableProxyUrlInput" placeholder="https://your-worker.workers.dev">
                <button id="saveProxyUrlBtn" class="btn btn-secondary" style="padding: 8px; font-size: 11px; margin-top: 4px;">Save</button>
            </div>
            <div id="llmLocalSection" style="display: none; margin-top: 8px;">
                <label style="font-size: 11px; color: #71717a;">Ollama URL</label>
                <input type="text" id="llmLocalUrlInput" placeholder="http://localhost:11434">
                <label style="font-size: 11px; color: #71717a; margin-top: 6px; display: block;">Model</label>
                <select id="llmLocalModelSelect">
                    <option value="qwen3.5:2b">qwen3.5:2b</option>
                    <option value="qwen3.5:4b">qwen3.5:4b</option>
                    <option value="llama3.1:8b">llama3.1:8b</option>
                </select>
                <button id="saveLocalLlmBtn" class="btn btn-secondary" style="padding: 8px; font-size: 11px; margin-top: 4px;">Save</button>
            </div>
            <div id="llmApiKeySection" style="margin-top: 8px;">
                <label style="font-size: 11px; color: #71717a;">API key</label>
                <div style="display: flex; gap: 4px;">
                    <input type="password" id="llmApiKeyInput" placeholder="Paste key">
                    <button id="saveApiKeyBtn" class="btn btn-secondary" style="padding: 8px 12px;">Save</button>
                </div>
            </div>
            <div class="row" style="margin-top: 12px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08);">
                <a id="loadProfileLink" style="color: #6366f1; cursor: pointer; font-size: 11px;">Load from desktop app</a>
            </div>
        </div>
    </div>

    <!-- Hidden: profile editor, cache, etc. - loaded on demand -->
    <div id="profileEditor" style="display: none;">
        <input type="text" id="inputName" placeholder="Name">
        <input type="email" id="inputEmail" placeholder="Email">
        <input type="tel" id="inputPhone" placeholder="Phone">
        <input type="text" id="inputLocation" placeholder="Location">
        <input type="text" id="inputSkills" placeholder="Skills (comma-separated)">
        <button id="saveProfileBtn" class="btn btn-primary" style="margin-top: 8px;">Save profile</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
