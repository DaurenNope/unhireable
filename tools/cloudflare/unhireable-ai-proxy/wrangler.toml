name = "unhireable-ai-proxy"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
FREE_DAILY_LIMIT = "50"

[observability]
enabled = true

# Set this secret before deploy:
# wrangler secret put GEMINI_API_KEY
#
# Create KV namespace:
# wrangler kv namespace create RATE_LIMIT_KV
#
# Deploy:
# wrangler deploy
