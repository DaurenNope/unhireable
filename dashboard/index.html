<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unhireable - Job Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #e4e4e7;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #a1a1aa;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            padding: 24px 32px;
            background: rgba(255,255,255,0.02);
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #6366f1;
        }

        .stat-label {
            font-size: 12px;
            color: #a1a1aa;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .controls {
            display: flex;
            gap: 12px;
            padding: 0 32px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        .filters {
            display: flex;
            gap: 16px;
            padding: 20px 32px;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 13px;
            color: #a1a1aa;
        }

        .filter-group select,
        .filter-group input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            padding: 8px 12px;
            color: #e4e4e7;
            font-size: 13px;
        }

        .jobs-container {
            padding: 0 32px 32px;
        }

        .job-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            transition: all 0.2s;
        }

        .job-card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .job-card.queued {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.05);
        }

        .job-header {
            display: flex;
            align-items: start;
            gap: 12px;
            margin-bottom: 8px;
        }

        .job-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .job-company {
            font-size: 14px;
            color: #a1a1aa;
        }

        .job-location {
            font-size: 13px;
            color: #71717a;
        }

        .job-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .score-badge {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
        }

        .score-high {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .score-medium {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
        }

        .score-low {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .job-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 12px;
        }

        .job-details {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
            color: #a1a1aa;
            display: none;
        }

        .job-card.expanded .job-details {
            display: block;
        }

        .blocks-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin: 12px 0;
        }

        .block-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
        }

        .block-label {
            font-size: 11px;
            color: #71717a;
            text-transform: uppercase;
        }

        .block-score {
            font-size: 18px;
            font-weight: 600;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #71717a;
        }

        .empty-state h3 {
            color: #a1a1aa;
            margin-bottom: 8px;
        }

        #fileInput {
            display: none;
        }

        .export-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(30, 30, 46, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            min-width: 280px;
            backdrop-filter: blur(10px);
        }

        .export-panel h4 {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .queue-count {
            font-size: 24px;
            font-weight: 700;
            color: #6366f1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Unhireable Dashboard</h1>
        <p>Review AI-evaluated jobs and queue for auto-application</p>
    </div>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">Total Jobs</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statGood">0</div>
            <div class="stat-label">Good Matches</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statQueued">0</div>
            <div class="stat-label">In Queue</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statAvg">0</div>
            <div class="stat-label">Avg Score</div>
        </div>
    </div>

    <div class="controls">
        <input type="file" id="fileInput" accept=".json">
        <button class="btn btn-primary" onclick="loadJobs()">
            📁 Load Evaluated Jobs
        </button>
        <button class="btn btn-secondary" onclick="exportQueue()">
            📤 Export Queue for Extension
        </button>
    </div>

    <div class="filters">
        <div class="filter-group">
            <label>Min Score:</label>
            <select id="minScore" onchange="filterJobs()">
                <option value="0">All</option>
                <option value="3">3.0+</option>
                <option value="4" selected>4.0+</option>
                <option value="4.5">4.5+</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Recommendation:</label>
            <select id="recFilter" onchange="filterJobs()">
                <option value="all">All</option>
                <option value="APPLY" selected>Apply Only</option>
                <option value="CONSIDER">Consider</option>
            </select>
        </div>
        <div class="filter-group">
            <input type="checkbox" id="showQueued" onchange="filterJobs()">
            <label for="showQueued">Show Queued Only</label>
        </div>
    </div>

    <div class="jobs-container" id="jobsContainer">
        <div class="empty-state">
            <h3>No jobs loaded</h3>
            <p>Click "Load Evaluated Jobs" to import your scanned and evaluated jobs.</p>
        </div>
    </div>

    <div class="export-panel" id="exportPanel" style="display: none;">
        <h4>Extension Queue</h4>
        <div class="queue-count" id="queueCount">0</div>
        <p style="font-size: 12px; color: #71717a; margin-top: 4px;">
            jobs ready to apply
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
