  provider: opencode
  model: "opencode/minimax-m2.5-free"  # or "opencode/nemotron-3-super-free"
  # No api_key needed for opencode (free tier)

cv:
  name: "Dauren Nox"
  title: "AI/ML Engineer & Blockchain Specialist"
  email: "dauren.nox@gmail.com"
  linkedin: "linkedin.com/in/dauren-nox"
  github: "github.com/daurenNox"
  summary: "AI/ML Engineer with practical AI education experience. Educated 100+ individuals on AI and blockchain technology through PTB Academy. Founded Zorox Research Lab, advised on $500K crypto portfolio. Strong technical background in Computer Science (CSUN), with expertise in JavaScript, Python, and emerging technologies. Passionate about applied AI and LLM technologies."
  skills:
    - Python
    - JavaScript
    - Machine Learning
    - AI/LLM Applications
    - Data Analysis
    - Smart Contracts
    - Fullstack Development
    - Project Management
