ai:
  # Options: openai, anthropic, gemini, ollama
  provider: gemini
  api_key: null  # Loaded from .env file (GEMINI_API_KEY)
  model: gemini-2.5-flash  # You have 1/5 RPM, 2.35K/250K TPM limits

cv:
  name: "Demo User"
  title: "Senior Software Engineer"
  summary: "Experienced full-stack developer with 5+ years building scalable web applications. Expert in React, Node.js, and cloud infrastructure."
  skills:
    - React
    - TypeScript
    - Node.js
    - Python
    - AWS
    - PostgreSQL
  experience_years: 5
  location: "Remote"
  salary_target:
    min: 150000
    max: 220000
    currency: "USD"

preferences:
  remote_only: true
  avoid_keywords:
    - "Java"
    - "PHP"
    - "WordPress"
  target_roles:
    - "Senior Engineer"
    - "Staff Engineer"
    - "Tech Lead"
    - "Principal Engineer"

evaluation:
  min_score: 3.0
  blocks:
    - "A"
    - "B"
    - "C"
    - "D"

# API Keys (put these in .env file):
# GEMINI_API_KEY=your_key_here
